# ── FlowMind — Render Blueprint ──────────────────────────────────
# Deploy: push this repo to GitHub, then in Render:
#   New + → Blueprint → select this repo.
# Render reads this file and provisions every service below.
#
# Database: hosted on Neon (free, permanent). Set DATABASE_URL_OVERRIDE
# in the Render dashboard with the Neon connection string — the app
# normalises it for asyncpg automatically.
#
# Cost: API (free) + Redis (free) are $0.
#       The Celery worker has no free plan → "starter" (~$7/mo).

services:
  # ── Redis (broker + cache) ─────────────────────────────────────
  - type: redis
    name: flowmind-redis
    plan: free                 # 25 MB, no persistence — fine for broker/cache
    ipAllowList: []            # internal-only access

  # ── FastAPI web service ────────────────────────────────────────
  - type: web
    name: flowmind-api
    runtime: docker
    plan: free
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true            # Render generates a strong secret
      # Neon connection string — paste it in the Render dashboard.
      - key: DATABASE_URL_OVERRIDE
        sync: false
      - key: REDIS_URL
        fromService: { type: redis, name: flowmind-redis, property: connectionString }
      - key: CELERY_BROKER_URL
        fromService: { type: redis, name: flowmind-redis, property: connectionString }
      - key: CELERY_RESULT_BACKEND
        fromService: { type: redis, name: flowmind-redis, property: connectionString }
      # Set this once the frontend URL exists, e.g. ["https://flowmind.vercel.app"]
      - key: BACKEND_CORS_ORIGINS
        sync: false

  # ── Celery worker (+ embedded beat scheduler) ──────────────────
  - type: worker
    name: flowmind-worker
    runtime: docker
    plan: starter                       # no free plan for workers
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    # --pool=solo: single process (no per-CPU forks) to fit the 512MB plan.
    dockerCommand: celery -A app.core.celery_app.celery worker --beat --pool=solo --loglevel=info --without-gossip --without-mingle
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        fromService: { type: web, name: flowmind-api, envVarKey: SECRET_KEY }
      # Same Neon connection string as the web service.
      - key: DATABASE_URL_OVERRIDE
        sync: false
      - key: REDIS_URL
        fromService: { type: redis, name: flowmind-redis, property: connectionString }
      - key: CELERY_BROKER_URL
        fromService: { type: redis, name: flowmind-redis, property: connectionString }
      - key: CELERY_RESULT_BACKEND
        fromService: { type: redis, name: flowmind-redis, property: connectionString }
